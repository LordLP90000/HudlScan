<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playbook Converter</title>
    <meta name="description" content="Convert playbook screenshots and PDFs into formatted Excel playcalling sheets" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              hudl: {
                orange: '#FF6600',
                'orange-hover': '#E65C00',
                dark: '#0B0E11',
                card: '#151921',
                'card-hover': '#1C2230',
                border: '#252D3A',
                'text-primary': '#F0F2F5',
                'text-secondary': '#8B95A5',
                'text-muted': '#5A6478',
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0B0E11;
        color: #F0F2F5;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #151921; }
      ::-webkit-scrollbar-thumb { background: #252D3A; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #353D4A; }
      /* Select dropdown dark styling */
      select option { background: #151921; color: #F0F2F5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
