services:
  hudlmcr-inference:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hudlmcr-inference
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/models/dots.mocr-svg
      - PORT=8000
    volumes:
      # Mount local downloaded model (relative path from docker/ directory)
      - ../models/dots.mocr-svg:/models/dots.mocr-svg:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    runtime: nvidia
